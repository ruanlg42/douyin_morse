<!doctype html>
<meta charset="utf-8">
<title>风格 × 乐器 一一对应总览 · 摩斯动机试听</title>
<style>
  body{background:#0e0f14;color:#e8e6f0;font:15px/1.6 -apple-system,system-ui,sans-serif;margin:0;padding:32px}
  h1{font-size:20px;color:#f2d27a;margin:0 0 6px}
  .sub{color:#9a97ab;font-size:13px;margin-bottom:20px;max-width:820px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;max-width:1150px}
  .card{background:#181a22;border:1px solid #2a2d3a;border-radius:12px;padding:13px 15px}
  .card.drum{border-color:#7af2b855}
  .tag{font-weight:600;color:#f2d27a;font-size:15px}
  .inst{color:#7aa2f2;font-size:13px;margin-left:8px}
  .drum .inst{color:#7af2b8}
  .meta{color:#6f6c82;font-size:12px;margin-top:2px}
  audio{width:100%;margin-top:8px;filter:invert(.92) hue-rotate(180deg)}
</style>
<h1>🎯 风格 × 乐器 一一对应（同一段摩斯 · LOVE）</h1>
<div class="sub">
  每个风格都精准配了一种真实采样乐器（9 个旋律风格各一种、互不重复；synthwave/edm/funk 用架子鼓节奏动机），
  全部带自然延音尾巴。听听每个风格的专属音色是否搭调，需要换的单独告诉我。
</div>
<div class="grid" id="root"></div>
<script>
const STYLES = [
  ["healing","治愈钢琴","🎹 大钢琴 Piano","C大调五声 · 120bpm",false],
  ["cinematic","电影叙事","🎹 管钟 Tubular Bells","D小调 · 120bpm · 教堂钟宏大",false],
  ["lofi","慵懒 Lo-Fi","🎹 电钢 Rhodes","F大调五声 · 86bpm · 温暖慵懒",false],
  ["retro8bit","8-bit 像素","🎹 八音盒 Music Box","E大调五声 · 128bpm · 复古童趣",false],
  ["jazz_cafe","爵士咖啡","🎹 颤音琴 Vibraphone","A大调五声 · 96bpm · 爵士金属",false],
  ["folk_acoustic","民谣原声","🎹 钢弦吉他 Steel Guitar","G大调五声 · 100bpm · 原声民谣",false],
  ["ambient","氛围冥想","🎹 钢片琴 Celeste","C大调五声 · 72bpm · 空灵梦幻",false],
  ["oriental","东方禅意","🎹 日本筝 Koto","D小调五声 · 82bpm · 东方拨弦",false],
  ["dream_pop","梦境迷幻","🎹 卡林巴 Kalimba","A大调五声 · 98bpm · 清脆治愈",false],
  ["synthwave","合成怀旧","🥁 架子鼓 groove","104bpm · 节奏动机",true],
  ["edm","电子律动","🥁 架子鼓 groove","122bpm · 节奏动机",true],
  ["funk","放克律动","🥁 架子鼓 groove","108bpm · 节奏动机",true],
];
const root = document.getElementById('root');
for(const [id,name,inst,meta,drum] of STYLES){
  const c=document.createElement('div'); c.className='card'+(drum?' drum':'');
  c.innerHTML = `<div><span class="tag">${name}</span><span class="inst">${inst}</span></div>`
    + `<div class="meta">${meta}</div>`
    + `<audio controls preload="none" src="/assets/style_demo/style_${id}.mp3?t=${Date.now()}"></audio>`;
  root.appendChild(c);
}
</script>
